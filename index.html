/* ========================================
   QUOTE - Message Style (Small, Centered)
   ======================================== */
#quoteContainer {
    position: fixed;
    top: 5vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    text-align: center;
    padding: 0 20px;
    width: 100%;
    max-width: 700px;
    pointer-events: none;
}

#quoteDisplay {
    display: inline-block;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(14px, 2vw, 20px);
    font-weight: 400;
    font-style: italic;
    color: rgba(204, 187, 227, 0.79);
    text-shadow: 
        0 1px 12px rgba(0, 0, 0, 0.6),
        0 2px 30px rgba(0, 0, 0, 0.3);
    letter-spacing: 0.3px;
    line-height: 1.5;
    padding: 6px 16px;
    opacity: 0;
    transform: translateY(-6px);
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    user-select: none;
    position: relative;
    max-width: 90%;
}

/* Subtle quote marks */
#quoteDisplay::before {
    content: '"';
    font-size: 1.4em;
    color: rgba(255, 77, 122, 0.3);
    position: absolute;
    top: -4px;
    left: -4px;
    font-family: 'Georgia', serif;
}

#quoteDisplay::after {
    content: '"';
    font-size: 1.4em;
    color: rgba(255, 77, 122, 0.3);
    position: absolute;
    bottom: -4px;
    right: -4px;
    font-family: 'Georgia', serif;
}

/* Small decorative line under quote */
#quoteDisplay::after {
    content: '"';
    font-size: 1.4em;
    color: rgba(255, 77, 122, 0.3);
    position: absolute;
    bottom: -4px;
    right: -4px;
    font-family: 'Georgia', serif;
}

/* Decorative line */
#quoteDisplay .line {
    display: block;
    width: 30px;
    height: 2px;
    margin: 4px auto 0;
    background: linear-gradient(90deg, transparent, rgba(255, 77, 122, 0.2), transparent);
    border-radius: 2px;
}

#quoteDisplay.visible {
    opacity: 1;
    transform: translateY(0);
}

#quoteDisplay.fading {
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.5s ease;
}

/* ========================================

[data-theme="dark"] #quoteDisplay::before,

}

    <script> 
        const canvas = document.getElementById('heart-canvas');
const ctx = canvas.getContext('2d');
let width, height;

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();


function getHeartPoints(cx, cy, size, points = 24) {
    const coords = [];
    for (let i = 0; i < points; i++) {
        const t = (i / points) * 2 * Math.PI;
        // Parametric heart equation
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        const px = cx + (x * size) / 16;
        const py = cy - (y * size) / 16;
        coords.push({ x: px, y: py });
    }
    return coords;
}


class Heart {
    constructor() {
        this.size = 7 + Math.random() * 22;        // random size
        this.x = Math.random() * width;            // random x position
        this.y = height + 20 + Math.random() * 50; // start below screen
        this.speed = 0.5 + Math.random() * 1.4;    // upward speed
        this.wobble = 0.4 + Math.random() * 1.5;   // side-to-side movement
        this.phase = Math.random() * 100;          // wobble phase
        this.opacity = 0.5 + Math.random() * 0.5;  // transparency
        this.color = `hsla(${340 + Math.random() * 25}, 90%, 65%, ${this.opacity})`;
        this.points = getHeartPoints(0, 0, this.size, 20);
    }

    update() {
        this.y -= this.speed;                      // move upward
        this.x += Math.sin(this.phase + this.y * 0.012) * this.wobble * 0.3; // wobble
        
        // Reset when off screen
        if (this.y < -this.size * 2.5) {
            this.y = height + 20 + Math.random() * 40;
            this.x = Math.random() * width;
            // Re-randomize properties
            this.size = 7 + Math.random() * 22;
            this.speed = 0.5 + Math.random() * 1.4;
            this.wobble = 0.4 + Math.random() * 1.5;
            this.opacity = 0.5 + Math.random() * 0.5;
            this.color = `hsla(${340 + Math.random() * 25}, 90%, 65%, ${this.opacity})`;
            this.points = getHeartPoints(0, 0, this.size, 20);
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.beginPath();
        const pts = this.points;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x, pts[i].y);
        }
        ctx.closePath();
        ctx.fillStyle = this.color;
        ctx.shadowColor = 'rgba(255, 70, 130, 0.6)';
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.restore();
    }
}



const hearts = [];
const NUM_HEARTS = 45;  // number of hearts on screen

// Create hearts
for (let i = 0; i < NUM_HEARTS; i++) {
    const h = new Heart();
    h.y = Math.random() * height;  // spread initial positions
    hearts.push(h);
}

// Animation loop
function drawHearts() {
    ctx.clearRect(0, 0, width, height);
    for (let heart of hearts) {
        heart.update();  // move heart
        heart.draw(ctx); // draw heart
    }
    requestAnimationFrame(drawHearts);  // loop forever
}
drawHearts();

//Audio JavaScript added editon two.
    // Load your pre-set song
const audio = new Audio('last_night.mp3');
const playBtn = document.getElementById('playBtn');

// Preload the song
audio.load();

// Play/Pause toggle
playBtn.addEventListener('click', function() {
    if (audio.paused) {
        audio.play();
        this.textContent = '⏸';
        this.style.background = 'rgba(255, 77, 122, 0.25)';
        this.style.borderColor = 'rgba(255, 77, 122, 0.5)';
        this.style.boxShadow = '0 8px 32px rgba(255, 77, 122, 0.3)';
    } else {
        audio.pause();
        this.textContent = '▶';
        this.style.background = 'rgba(255, 255, 255, 0.12)';
        this.style.borderColor = 'rgba(255, 255, 255, 0.25)';
        this.style.boxShadow = '0 8px 32px rgba(0, 0, 0, 0.25)';
    }
});

// Reset when song ends
audio.addEventListener('ended', function() {
    playBtn.textContent = '▶';
    audio.currentTime = 0;
    playBtn.style.background = 'rgba(255, 255, 255, 0.12)';
    playBtn.style.borderColor = 'rgba(255, 255, 255, 0.25)';
    playBtn.style.boxShadow = '0 8px 32px rgba(0, 0, 0, 0.25)';
});

// Error handling
audio.addEventListener('error', function() {
    console.error('Could not load "last_night.mp3". Make sure the file exists.');
    playBtn.textContent = '⚠';
    setTimeout(() => {
        playBtn.textContent = '▶';
    }, 2000);
});

(function() {
    const quotes = [
        "You are my sunshine",
        "Forever & always",
        "You complete me",
        "My heart belongs to you",
        "You make me smile",
        "Together is my favorite place",
        "Love you to the moon and back",
        "You're my happy place",
        "My one and only",
        "Best decision ever",
        "You're my everything",
        "I choose you, always",
        "You're my soulmate",
        "Endless love",
        "Perfect together",
        "You're my dream come true",
        "All for you",
        "Always & forever",
        "You're my world",
        "I love you",
        "You are my reason",
        "My heart is yours",
        "You're my forever",
        "Every day with you is a gift",
        "You are my greatest adventure",
        "You're my missing piece",
        "My love for you grows daily",
        "You're my peaceful place",
        "Together we shine",
        "You're my favorite hello"
    ];

    const display = document.getElementById('quoteDisplay');
    const content = document.getElementById('quoteContent');
    let currentIndex = 0;

    function showNextQuote() {
        const quote = quotes[currentIndex];
        content.textContent = quote;
        
        // Show with animation
        display.classList.remove('fading');
        display.classList.add('visible');
        
        // Move to next index
        currentIndex = (currentIndex + 1) % quotes.length;
        
        // Hide after 4 seconds (shorter for message style)
        setTimeout(() => {
            display.classList.remove('visible');
            display.classList.add('fading');
            
            // Show next quote after brief pause
            setTimeout(showNextQuote, 1200);
        }, 5000);
    }

    // Start the rotation
    setTimeout(showNextQuote, 800);
})();
